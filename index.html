<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>JESHROHN Journal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JESHROHN">
  <link rel="apple-touch-icon" href="assets/new_jeshrohn_logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <div id="app-container">
    
    <!-- MAIN CHAT VIEW -->
    <section id="chat-view" class="page active">
      <header class="glass-header">
        <div class="header-content">
           <img src="assets/new_jeshrohn_logo.jpg" alt="JESHROHN Logo" class="brand-logo">
           <div class="header-text">
             <h1>JESHROHN</h1>
             <span class="status-indicator"></span><span class="status-text">Online</span>
           </div>
        </div>
        <button id="btn-menu" class="icon-btn" aria-label="Menu">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </header>
      
      <main id="chat-messages" class="chat-feed">
        <!-- Messages will be injected here -->
        <div class="message bot intro">
          <img src="assets/bot_avatar.png" class="avatar bot-avatar" alt="JESHROHN Bot">
          <div class="bubble glass-bubble bot-glass">
            Hello! I'm JESHROHN. Talk to me! Ask me anything like "Are you from around here?"
          </div>
        </div>
      </main>

      <footer class="chat-input-area glass-footer">
        <!-- Sticker Tray (Hidden by default) -->
        <div id="sticker-tray" class="glass-tray hidden">
          <div class="sticker-grid">
            <img src="assets/sticker_1.png" class="sticker-item" alt="Sticker 1" data-id="1">
            <img src="assets/sticker_2.png" class="sticker-item" alt="Sticker 2" data-id="2">
            <img src="assets/sticker_3.png" class="sticker-item" alt="Sticker 3" data-id="3">
          </div>
        </div>
        
        <div class="input-row">
          <button id="btn-add-picture" class="action-btn" aria-label="Add Picture">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          </button>
          
          <button id="btn-stickers" class="action-btn" aria-label="Stickers">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
          </button>

          <button id="btn-mic" class="action-btn" aria-label="Record Voice">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
          </button>

          <input type="text" id="chat-input" placeholder="Message..." autocomplete="off">
          
          <button id="btn-send" class="send-btn" aria-label="Send">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
        <input type="file" id="file-upload" accept="image/*" style="display: none;">
      </footer>
    </section>

    <!-- SAVED / CREATE MORE VIEW -->
    <section id="saved-view" class="page">
      <header class="glass-header">
        <button id="btn-back" class="icon-btn" aria-label="Back">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="header-text mx-auto">
          <h1>Saved & Create</h1>
        </div>
        <div style="width: 24px;"></div> <!-- spacer -->
      </header>
      
      <main class="content-feed">
        <div class="saved-card glass-card">
          <div class="card-icon gradient-pink">
             <svg viewBox="0 0 24 24" width="24" height="24" stroke="white" stroke-width="2" fill="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
          </div>
          <div class="card-info">
            <h3>Saved Messages</h3>
            <p>0 items saved</p>
          </div>
        </div>

        <div class="saved-card glass-card mt-4">
          <div class="card-icon gradient-blue">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="white" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
          </div>
          <div class="card-info">
            <h3>Create More</h3>
            <p>Create new chatbot persona</p>
          </div>
        </div>
      </main>
    </section>
    
  </div>
  
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.log('Service Worker registration failed', err));
      });
    }
  </script>
</body>
</html>
